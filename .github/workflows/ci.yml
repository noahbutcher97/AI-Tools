name: CI

on:
  push:
    branches: [main]
  pull_request:

# Minimum-viable CI for the MCP-Servers tree. Four jobs:
#   1. Syntax-check every tracked .mjs under MCP-Servers/ (catches typos/parse
#      errors that would crash an MCP client on launch — but does NOT resolve
#      imports, so missing deps slip through; the deps-consistent job covers
#      that).
#   2. Lib tests — unit tests for shared infrastructure under MCP-Servers/lib/
#      (resolve-config, safepath, etc.). Pure functions, zero deps, fast.
#   3. Perforce bridge tests — parser unit tests AND the server registration
#      smoke test (spins up the MCP server over stdio and asserts every tool
#      registers). The smoke test imports @modelcontextprotocol/sdk, so this
#      job installs deps via `npm ci`.
#   4. Validate each bridge's package-lock.json against its package.json via
#      `npm ci --dry-run`. Catches lockfile drift before it hits an installer.

jobs:
  syntax-check:
    name: Syntax check (node --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: node --check every tracked .mjs under MCP-Servers/
        run: |
          set -euo pipefail
          # `git ls-files` ensures we only check tracked source, never
          # vendor (node_modules) which would balloon the run.
          files=$(git ls-files 'MCP-Servers/**/*.mjs')
          if [ -z "$files" ]; then
            echo "No .mjs files found — something is wrong." >&2
            exit 1
          fi
          for f in $files; do
            echo "node --check $f"
            node --check "$f"
          done

  lib-tests:
    name: Lib tests (shared infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run lib unit tests
        # Pure functions, no deps — node:test built-in only.
        run: |
          cd MCP-Servers/lib
          node --test

  perforce-tests:
    name: Perforce bridge tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install perforce bridge deps
        # server.test.mjs uses @modelcontextprotocol/sdk to launch the server
        # over stdio for the tool-registration smoke test; parser tests stay
        # dep-free but `node --test` auto-discovers all *.test.mjs in cwd.
        run: |
          cd MCP-Servers/bridges/perforce
          npm ci
      - name: Run perforce test suite
        run: |
          cd MCP-Servers/bridges/perforce
          node --test

  deps-consistent:
    name: Bridge deps consistent (npm ci --dry-run)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bridge: [atlassian, miro, perforce]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate ${{ matrix.bridge }} lockfile
        run: |
          cd MCP-Servers/bridges/${{ matrix.bridge }}
          npm ci --dry-run
